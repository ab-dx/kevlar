apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: minio-setup
  name: minio-setup
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: minio-setup
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: minio-setup
    spec:
      containers:
        - command:
            - /bin/sh
            - -c
            - ' sleep 5 /usr/bin/mc alias set myminio http://minio:9000 admin adminpassword; /usr/bin/mc mb myminio/kevlar-storage --ignore-existing; /usr/bin/mc anonymous set download myminio/kevlar-storage; /usr/bin/mc anonymous set public myminio/kevlar-storage;  exit 0; '
          image: minio/mc:latest
          name: kevlar-minio-setup
      restartPolicy: Always
