apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: nginx
  name: nginx
spec:
  ports:
    - name: "9000"
      port: 9000
      targetPort: 9000
    - name: "3000"
      port: 3000
      targetPort: 3000
  selector:
    io.kompose.service: nginx
